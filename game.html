<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Играть - Knowledge Dash</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="game-body">
  <header class="topbar game-topbar">
    <a class="brand" href="index.html"><span class="brand-mark">KD</span><span>Knowledge Dash</span></a>
    <nav class="nav">
      <a class="active" href="game.html">Играть</a>
      <a href="levels.html">Уровни</a>
      <a href="collection.html">Коллекция</a>
      <a href="controls.html">Управление</a>
    </nav>
  </header>

  <main class="game-shell">
    <aside class="level-select" id="levelSelect"></aside>
    <section class="game-stage">
      <div class="hud">
        <div><small>Attempt</small><b id="attempt">1</b></div>
        <div><small>Progress</small><b id="progress">0%</b></div>
        <div><small>Coins</small><b id="coins">0 / 0</b></div>
        <div><small>Total</small><b id="totalCoins">0</b></div>
        <div><small>Best</small><b id="best">0%</b></div>
      </div>
      <canvas id="game" width="1280" height="720" aria-label="Knowledge Dash game canvas"></canvas>
      <div class="attempt-flash" id="attemptFlash">Attempt 1</div>
      <div class="countdown" id="countdown"></div>
      <div class="game-controls">
        <button id="restartBtn">Restart</button>
        <button id="pauseBtn">Pause</button>
      </div>
    </section>
  </main>

  <div class="modal" id="knowledgeModal" aria-hidden="true">
    <div class="modal-card">
      <p class="eyebrow" id="modalType">Artifact</p>
      <h2 id="modalTitle">Knowledge found</h2>
      <p id="modalText"></p>
      <div class="answers" id="answers"></div>
      <button id="modalContinue" class="primary">Продолжить</button>
    </div>
  </div>

  <div class="modal" id="completeModal" aria-hidden="true">
    <div class="modal-card complete-card">
      <p class="eyebrow">Level Complete</p>
      <h2 id="completeTitle">Level Complete</h2>
      <div class="results" id="results"></div>
      <button id="nextLevelBtn" class="primary">Следующий уровень</button>
      <button id="replayBtn" class="secondary">Переиграть</button>
    </div>
  </div>

  <script src="assets/game.js"></script>
</body>
</html>
